# ----------------------------------------------------------------
# Configuracion de Base de Datos PostgreSQL
# ----------------------------------------------------------------
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5437/grupofrontera}
quarkus.datasource.jdbc.max-size=16

# ----------------------------------------------------------------
# Hibernate ORM
# ----------------------------------------------------------------
quarkus.hibernate-orm.database.generation=none

# ----------------------------------------------------------------
# Flyway (Migraciones)
# ----------------------------------------------------------------
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true

# ----------------------------------------------------------------
# Jackson
# ----------------------------------------------------------------
quarkus.jackson.serialization.write-dates-as-timestamps=false

# ----------------------------------------------------------------
# Swagger / OpenAPI
# ----------------------------------------------------------------
quarkus.swagger-ui.always-include=true

# ----------------------------------------------------------------
# HTTP / Puerto
# ----------------------------------------------------------------
quarkus.http.port=${PORT:8089}

# ----------------------------------------------------------------
# Configuracion de pruebas (H2 en memoria)
# ----------------------------------------------------------------
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:datos_test;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.flyway.enabled=false
%test.quarkus.jacoco.report=true
%test.quarkus.jacoco.report-location=target/site/jacoco
%test.quarkus.jacoco.includes=com/grupofrontera/msdatos/domain/service/*
