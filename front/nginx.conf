server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # SPA: cualquier ruta desconocida cae en index.html (routing del lado del cliente)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache largo para assets con hash en el nombre
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Proxy de la API hacia el BFF (mismo origen para el navegador, evita
    # depender de localhost y problemas de CORS al acceder desde otra IP/host).
    location /api/ {
        proxy_pass http://bff:8090;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
