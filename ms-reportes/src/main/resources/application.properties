quarkus.http.port=8087
quarkus.application.name=ms-reportes

# --- Base de datos PostgreSQL (historial de reportes generados) ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=${DB_USER:postgres}
quarkus.datasource.password=${DB_PASSWORD:postgres}
quarkus.datasource.jdbc.url=${DB_URL:jdbc:postgresql://localhost:5439/db_reportes}
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true
quarkus.flyway.baseline-on-migrate=true

# --- Cliente REST hacia MS-KPIs ---
quarkus.rest-client.kpis-api.url=http://localhost:8086
quarkus.rest-client.kpis-api.scope=jakarta.enterprise.context.ApplicationScoped
quarkus.rest-client.kpis-api.connect-timeout=5000
quarkus.rest-client.kpis-api.read-timeout=5000

# --- Cliente REST hacia MS-Datos (nombres de sucursal para reportes) ---
quarkus.rest-client.datos-api.url=http://localhost:8089
quarkus.rest-client.datos-api.scope=jakarta.enterprise.context.ApplicationScoped
quarkus.rest-client.datos-api.connect-timeout=5000
quarkus.rest-client.datos-api.read-timeout=5000

# --- Configuracion de pruebas (H2 en memoria: *ResourceTest no necesita Postgres real) ---
%test.quarkus.rest-client.kpis-api.url=http://localhost:8086
%test.quarkus.rest-client.datos-api.url=http://localhost:8089
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:reportes_test;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.flyway.enabled=false
