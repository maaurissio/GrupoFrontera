quarkus.http.port=8086
quarkus.application.name=ms-kpis

# Swagger UI (incluido tambien en modo packaged/produccion)
quarkus.swagger-ui.always-include=true

# --- Base de datos kpis_db ---
quarkus.datasource.db-kind=postgresql
quarkus.datasource.username=postgres
quarkus.datasource.password=postgres
quarkus.datasource.jdbc.url=jdbc:postgresql://localhost:5438/kpis_db
quarkus.hibernate-orm.database.generation=none
quarkus.flyway.migrate-at-start=true

# --- RabbitMQ (produccion) ---
rabbitmq-host=localhost
rabbitmq-port=5672
rabbitmq-username=guest
rabbitmq-password=guest

# Canal para eventos de ventas
mp.messaging.incoming.venta-realizada.connector=smallrye-rabbitmq
mp.messaging.incoming.venta-realizada.queue.name=venta.realizada
mp.messaging.incoming.venta-realizada.exchange.name=ventas.exchange
mp.messaging.incoming.venta-realizada.exchange.type=direct
mp.messaging.incoming.venta-realizada.routing-keys=venta.realizada
mp.messaging.incoming.venta-realizada.failure-strategy=reject

# Canal para eventos de inventario
mp.messaging.incoming.actualizacion-stock.connector=smallrye-rabbitmq
mp.messaging.incoming.actualizacion-stock.queue.name=actualizacion.stock
mp.messaging.incoming.actualizacion-stock.exchange.name=inventario.exchange
mp.messaging.incoming.actualizacion-stock.exchange.type=direct
mp.messaging.incoming.actualizacion-stock.routing-keys=actualizacion.stock
mp.messaging.incoming.actualizacion-stock.failure-strategy=reject

# --- Configuracion de pruebas ---
%test.quarkus.datasource.db-kind=h2
%test.quarkus.datasource.jdbc.url=jdbc:h2:mem:kpis_test;DB_CLOSE_DELAY=-1
%test.quarkus.hibernate-orm.database.generation=drop-and-create
%test.quarkus.flyway.enabled=false
