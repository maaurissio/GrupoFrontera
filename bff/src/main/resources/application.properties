# Puerto del BFF
quarkus.http.port=${PORT:8090}

# REST Clients — URLs de los microservicios
ms-datos/mp-rest/url=${MS_DATOS_URL:http://localhost:8089}
ms-datos/mp-rest/scope=jakarta.inject.Singleton

ms-auth/mp-rest/url=${MS_AUTH_URL:http://localhost:8088}
ms-auth/mp-rest/scope=jakarta.inject.Singleton

ms-users/mp-rest/url=${MS_USERS_URL:http://localhost:8085}
ms-users/mp-rest/scope=jakarta.inject.Singleton

ms-kpis/mp-rest/url=${MS_KPIS_URL:http://localhost:8086}
ms-kpis/mp-rest/scope=jakarta.inject.Singleton

ms-reportes/mp-rest/url=${MS_REPORTES_URL:http://localhost:8087}
ms-reportes/mp-rest/scope=jakarta.inject.Singleton

# Propagar códigos 4xx tal cual desde los microservicios (no convertir a excepción)
quarkus.rest-client.disable-default-mapper=true

# Swagger
quarkus.swagger-ui.always-include=true

# Jackson
quarkus.jackson.serialization.write-dates-as-timestamps=false

# CORS — permite llamadas desde el frontend en desarrollo
quarkus.http.cors.enabled=true
quarkus.http.cors.origins=http://localhost:5173
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization
quarkus.http.cors.exposed-headers=Content-Disposition
quarkus.http.cors.access-control-allow-credentials=true
