version: "3.9"

services:
  postgres:
    container_name: gf-postgres
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: grupofrontera
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    networks:
      - gf-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5

  ms-datos:
    container_name: gf-ms-datos
    build:
      context: ./ms-datos
      dockerfile: src/main/docker/Dockerfile
    environment:
      DB_URL: jdbc:postgresql://postgres:5432/grupofrontera
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: "8080"
    ports:
      - "8080:8080"
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - gf-network

  bff:
    container_name: gf-bff
    build:
      context: ./bff
      dockerfile: src/main/docker/Dockerfile
    environment:
      MS_DATOS_URL: http://ms-datos:8080
      PORT: "8081"
    ports:
      - "8081:8081"
    depends_on:
      - ms-datos
    networks:
      - gf-network

volumes:
  pgdata:

networks:
  gf-network:
    driver: bridge
