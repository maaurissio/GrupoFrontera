# ================================================================
# GrupoFrontera — Docker Compose Global (TODO en contenedores)
#
# Cada servicio se construye DENTRO de Docker (multi-stage):
# no necesitas Maven ni Node instalados localmente.
#
# LEVANTAR TODO (build + run):
#   docker compose up -d --build
#
# Ver logs:        docker compose logs -f
# Apagar todo:     docker compose down
# Apagar + borrar datos: docker compose down -v
#
# SOLO INFRAESTRUCTURA (si quieres correr los ms con ./mvnw quarkus:dev):
#   docker compose up -d auth-db users-db datos-db kpis-db rabbitmq
#
# ACCESOS (desde el navegador / host):
#   front       → http://localhost:5173
#   bff         → http://localhost:8090
#   ms-auth     → http://localhost:8088
#   ms-users    → http://localhost:8085
#   ms-datos    → http://localhost:8089
#   ms-kpis     → http://localhost:8086
#   ms-reportes → http://localhost:8087
#   RabbitMQ UI → http://localhost:15672  (guest/guest)
#
# NOTA: detén los contenedores manuales viejos antes de levantar esto
#       (pg-auth, pg-users, pg-datos, pg-kpis, rabbitmq) para no chocar puertos:
#       docker rm -f pg-auth pg-users pg-datos pg-kpis rabbitmq
# ================================================================

services:

  # ==============================================================
  # INFRAESTRUCTURA — bases de datos y mensajeria
  # ==============================================================

  auth-db:
    image: postgres:16-alpine
    container_name: gf_auth_db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - auth_db_datos:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  users-db:
    image: postgres:16-alpine
    container_name: gf_users_db
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - users_db_datos:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d users_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  datos-db:
    image: postgres:16-alpine
    container_name: gf_datos_db
    environment:
      POSTGRES_DB: datos_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5437:5432"
    volumes:
      - datos_db_datos:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d datos_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  kpis-db:
    image: postgres:16-alpine
    container_name: gf_kpis_db
    environment:
      POSTGRES_DB: kpis_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5438:5432"
    volumes:
      - kpis_db_datos:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kpis_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: gf_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_datos:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==============================================================
  # MICROSERVICIOS — se compilan dentro de Docker (multi-stage)
  # ==============================================================

  ms-auth:
    build:
      context: ./ms-auth
      dockerfile: Dockerfile
    container_name: gf_ms_auth
    image: grupofrontera/ms-auth:latest
    ports:
      - "8088:8088"
    environment:
      QUARKUS_HTTP_PORT: "8088"
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://auth-db:5432/auth_db
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
    depends_on:
      auth-db:
        condition: service_healthy
    restart: on-failure

  ms-users:
    build:
      context: ./ms-users
      dockerfile: Dockerfile
    container_name: gf_ms_users
    image: grupofrontera/ms-users:latest
    ports:
      - "8085:8085"
    environment:
      QUARKUS_HTTP_PORT: "8085"
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://users-db:5432/users_db
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
    depends_on:
      users-db:
        condition: service_healthy
    restart: on-failure

  ms-datos:
    build:
      context: ./ms-datos
      dockerfile: Dockerfile
    container_name: gf_ms_datos
    image: grupofrontera/ms-datos:latest
    ports:
      - "8089:8089"
    environment:
      QUARKUS_HTTP_PORT: "8089"
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://datos-db:5432/datos_db
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
      DB_URL: jdbc:postgresql://datos-db:5432/datos_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    depends_on:
      datos-db:
        condition: service_healthy
    restart: on-failure

  ms-kpis:
    build:
      context: ./ms-kpis
      dockerfile: Dockerfile
    container_name: gf_ms_kpis
    image: grupofrontera/ms-kpis:latest
    ports:
      - "8086:8086"
    environment:
      QUARKUS_HTTP_PORT: "8086"
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://kpis-db:5432/kpis_db
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
    depends_on:
      kpis-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  ms-reportes:
    build:
      context: ./ms-reportes
      dockerfile: Dockerfile
    container_name: gf_ms_reportes
    image: grupofrontera/ms-reportes:latest
    ports:
      - "8087:8087"
    environment:
      QUARKUS_HTTP_PORT: "8087"
      QUARKUS_REST_CLIENT_KPIS_API_URL: http://ms-kpis:8086
    depends_on:
      ms-kpis:
        condition: service_started
    restart: on-failure

  bff:
    build:
      context: ./bff
      dockerfile: Dockerfile
    container_name: gf_bff
    image: grupofrontera/bff:latest
    ports:
      - "8090:8090"
    environment:
      QUARKUS_HTTP_PORT: "8090"
      MS_AUTH_URL: http://ms-auth:8088
      MS_USERS_URL: http://ms-users:8085
      MS_DATOS_URL: http://ms-datos:8089
      MS_KPIS_URL: http://ms-kpis:8086
      MS_REPORTES_URL: http://ms-reportes:8087
    depends_on:
      - ms-auth
      - ms-users
      - ms-datos
      - ms-kpis
      - ms-reportes
    restart: on-failure

  # ==============================================================
  # FRONTEND — build con Vite, servido por nginx
  # ==============================================================

  front:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: gf_front
    image: grupofrontera/front:latest
    ports:
      - "5173:80"
    depends_on:
      - bff
    restart: on-failure

volumes:
  auth_db_datos:
  users_db_datos:
  datos_db_datos:
  kpis_db_datos:
  rabbitmq_datos:
