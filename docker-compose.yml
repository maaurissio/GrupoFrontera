# ================================================================
# GrupoFrontera — Docker Compose Global
#
# LEVANTAR TODO:
#   Paso 1 — empaquetar cada servicio (solo la primera vez o tras cambios):
#     cd ms-auth     && ./mvnw package -DskipTests && cd ..
#     cd ms-users    && ./mvnw package -DskipTests && cd ..
#     cd ms-datos    && ./mvnw package -DskipTests && cd ..
#     cd ms-kpis     && ./mvnw package -DskipTests && cd ..
#     cd ms-reportes && ./mvnw package -DskipTests && cd ..
#     cd bff         && ./mvnw package -DskipTests && cd ..
#
#   Paso 2 — levantar todo:
#     docker compose up -d
#
# SOLO INFRAESTRUCTURA (desarrollo con ./mvnw quarkus:dev):
#   docker compose up -d auth-db users-db datos-db kpis-db rabbitmq
#
# PUERTOS:
#   ms-auth     → http://localhost:8080
#   ms-users    → http://localhost:8081
#   ms-datos    → http://localhost:8082
#   ms-kpis     → http://localhost:8086
#   ms-reportes → http://localhost:8087
#   bff         → http://localhost:8090
#   RabbitMQ UI → http://localhost:15672  (guest/guest)
# ================================================================

services:

  # ==============================================================
  # INFRAESTRUCTURA — bases de datos y mensajeria
  # ==============================================================

  auth-db:
    image: postgres:15-alpine
    container_name: auth_db
    environment:
      POSTGRES_DB: auth_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5433:5432"
    volumes:
      - auth_db_datos:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d auth_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  users-db:
    image: postgres:15-alpine
    container_name: users_db
    environment:
      POSTGRES_DB: users_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5434:5432"
    volumes:
      - users_db_datos:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d users_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  datos-db:
    image: postgres:15-alpine
    container_name: datos_db
    environment:
      POSTGRES_DB: datos_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5435:5432"
    volumes:
      - datos_db_datos:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d datos_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  kpis-db:
    image: postgres:15-alpine
    container_name: kpis_db
    environment:
      POSTGRES_DB: kpis_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5438:5432"
    volumes:
      - kpis_db_datos:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d kpis_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    container_name: grupofrontera_rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_datos:/var/lib/rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ==============================================================
  # MICROSERVICIOS
  # Requieren ./mvnw package -DskipTests previo en cada directorio.
  # ==============================================================

  ms-auth:
    build:
      context: ms-auth
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: ms_auth
    image: grupofrontera/ms-auth:latest
    ports:
      - "8080:8080"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://auth-db:5432/auth_db
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
      QUARKUS_FLYWAY_MIGRATE_AT_START: "true"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
    depends_on:
      auth-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  ms-users:
    build:
      context: ms-users
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: ms_users
    image: grupofrontera/ms-users:latest
    ports:
      - "8081:8080"
    environment:
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://users-db:5432/users_db
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
      QUARKUS_FLYWAY_MIGRATE_AT_START: "true"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
    depends_on:
      users-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  ms-datos:
    build:
      context: ms-datos
      dockerfile: src/main/docker/Dockerfile
    container_name: ms_datos
    image: grupofrontera/ms-datos:latest
    ports:
      - "8082:8080"
    environment:
      DB_URL: jdbc:postgresql://datos-db:5432/datos_db
      DB_USER: postgres
      DB_PASSWORD: postgres
      PORT: "8080"
      QUARKUS_FLYWAY_MIGRATE_AT_START: "true"
    depends_on:
      datos-db:
        condition: service_healthy
    restart: on-failure

  ms-kpis:
    build:
      context: ms-kpis
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: ms_kpis
    image: grupofrontera/ms-kpis:latest
    ports:
      - "8086:8086"
    environment:
      QUARKUS_HTTP_PORT: "8086"
      QUARKUS_DATASOURCE_JDBC_URL: jdbc:postgresql://kpis-db:5432/kpis_db
      QUARKUS_DATASOURCE_USERNAME: postgres
      QUARKUS_DATASOURCE_PASSWORD: postgres
      QUARKUS_FLYWAY_MIGRATE_AT_START: "true"
      RABBITMQ_HOST: rabbitmq
      RABBITMQ_PORT: "5672"
    depends_on:
      kpis-db:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    restart: on-failure

  ms-reportes:
    build:
      context: ms-reportes
      dockerfile: src/main/docker/Dockerfile.jvm
    container_name: ms_reportes
    image: grupofrontera/ms-reportes:latest
    ports:
      - "8087:8087"
    environment:
      QUARKUS_HTTP_PORT: "8087"
      QUARKUS_REST_CLIENT_KPIS_API_URL: http://ms-kpis:8086
    depends_on:
      ms-kpis:
        condition: service_started
    restart: on-failure

  bff:
    build:
      context: ./bff
      dockerfile: src/main/docker/Dockerfile
    container_name: gf_bff
    image: grupofrontera/bff:latest
    ports:
      - "8090:8090"
    environment:
      MS_DATOS_URL: http://ms-datos:8080
      MS_AUTH_URL: http://ms-auth:8080
      MS_USERS_URL: http://ms-users:8080
      MS_KPIS_URL: http://ms-kpis:8086
      MS_REPORTES_URL: http://ms-reportes:8087
      PORT: "8090"
    depends_on:
      - ms-datos
      - ms-auth
      - ms-users
      - ms-kpis
      - ms-reportes
    restart: on-failure

volumes:
  auth_db_datos:
  users_db_datos:
  datos_db_datos:
  kpis_db_datos:
  rabbitmq_datos:
